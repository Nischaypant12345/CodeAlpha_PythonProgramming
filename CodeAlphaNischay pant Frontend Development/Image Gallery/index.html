<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/300/200" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1016/300/200" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1018/300/200" onclick="openImage(this.src)">
    <img src="https://picsum.photos/id/1020/300/200" onclick="openImage(this.src)">
</div>

<div id="lightbox">
    <span onclick="closeImage()">×</span>
    <img id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
